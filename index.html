<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DanielitooMB | Links</title>

    <meta property="og:title" content="DanielitooMB | Links">
    <meta property="og:description" content="Welcome to my animation bio-site.">
    <meta property="og:image" content="https://tu-sitio.github.io/tu-foto-de-portada.jpg">
    <meta property="og:url" content="https://danielitoomb.github.io/">

    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="css/styles.css">
    
</head>
<body>
  <div class="back"></div>
  <div class="profile-container">
    <img src="imag/banner.jpg" class="banner-img">
    <div class="icon-circle">
      <img src="imag/profile.jpg" class="icon-circle-img">
    </div>
  </div>
    <p class="name">DanielitooMB</p>
  <div class="social-media-container">
    <nav class="links" aria-label="Links principales">
        <a class="link-card youtube" href="https://youtube.com/@DanielitooMB"
        aria-label="YouTube" target="_blank">YouTube</a>
        <a class="link-card instagram" href="https://instagram.com/DanielitooMB"
        aria-label="Instagram" target="_blank">Instagram</a>
    </nav>
  </div>
  <div class="share-container">
    <a id="share-button">
      <i class="fa-solid fa-arrow-up-from-bracket"></i>
    </a>
  </div>
  <script>
    const shareButton = document.getElementById("share-button");

    shareButton.addEventListener("click", async () => {
      //Verifica si el navegador soporta la API de compartir
      if (navigator.share) {
        try {
          await navigator.share({
            title: document.title, //Obtiene el título de la página
            url: window.location.href, //Obtiene la URL actual
          });
          console.log("Successful share");
        } catch (error) {
          console.error("Error sharing:", error);
        }
        } else {
          navigator.clipboard.writeText(window.location.href)
            .then(() => {
              Swal.fire({
                icon: "success",
                title: "Link copied!",
                text: "Paste it anywhere to share.",
                timer: 2000,
                showConfirmButton: false,
                toast: true,
                position: "top",
                theme: 'dark'
              });
            })
            .catch(() => {
              Swal.fire({
                title: "Share this link",
                text: window.location.href,
                icon: "info",
                confirmButtonText: "OK",
                theme: 'dark'
              });
            });
        }
    });
  </script>

</body>
</html>
