<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galería Material Motion</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0f;
    --surface: #1a1a1d;
    --surface2: #242428;
    --accent: #c8a96e;
    --accent2: #e8d5a3;
    --text: #f0ede8;
    --text-muted: #8a8680;
    --radius: 16px;
    --overlay-bg: rgba(10, 10, 11, 0.92);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.5;
  }

  header {
    padding: 48px 48px 32px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1;
  }
  .logo span { color: var(--accent); }

  .header-sub {
    font-size: 0.8rem;
    color: var(--text-muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .gallery-label {
    padding: 0 48px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .gallery-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, var(--surface2), transparent);
  }
  .gallery-label span {
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  /* === GALLERY GRID === */
  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
    padding: 0 48px 80px;
  }

  .card {
    position: relative;
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    background: var(--surface);
    aspect-ratio: 4/3;
    will-change: transform;
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
                box-shadow 0.35s ease;
  }

  .card:hover {
    transform: translateY(-6px) scale(1.02);
    box-shadow: 0 32px 64px rgba(0,0,0,0.6), 0 0 0 1px rgba(200,169,110,0.15);
    z-index: 1;
  }

  .card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                filter 0.4s ease;
    filter: saturate(0.85) brightness(0.95);
  }
  .card:hover img {
    transform: scale(1.08);
    filter: saturate(1.1) brightness(1.05);
  }

  /* Gradient overlay on card */
  .card-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(10,10,11,0.85) 0%, transparent 55%);
    display: flex;
    align-items: flex-end;
    padding: 20px;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .card:hover .card-overlay { opacity: 1; }

  .card-meta {
    transform: translateY(8px);
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .card:hover .card-meta { transform: translateY(0); }

  .card-meta h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 400;
    margin-bottom: 2px;
  }
  .card-meta p {
    font-size: 0.72rem;
    color: var(--accent2);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* === LIGHTBOX (Container Transform) === */
  .lightbox {
    position: fixed;
    inset: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
  }

  .lightbox.active {
    pointer-events: all;
  }

  .lightbox-backdrop {
    position: absolute;
    inset: 0;
    background: var(--overlay-bg);
    opacity: 0;
    transition: opacity 0.4s ease;
    backdrop-filter: blur(12px) saturate(0.6);
    -webkit-backdrop-filter: blur(12px) saturate(0.6);
  }
  .lightbox.active .lightbox-backdrop { opacity: 1; }

  /* The expanding container */
  .lightbox-container {
    position: absolute;
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 48px 96px rgba(0,0,0,0.8);
    transform-origin: center center;
    will-change: transform, border-radius, width, height, top, left;
  }

  .lightbox-img-wrap {
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }

  .lightbox-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .lightbox-info {
    padding: 24px 28px;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.3s ease 0.25s, transform 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.25s;
  }
  .lightbox.expanded .lightbox-info {
    opacity: 1;
    transform: translateY(0);
  }

  .lightbox-info h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-weight: 400;
  }
  .lightbox-info p {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 3px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .lightbox-close {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 1px solid var(--surface2);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.2s;
    flex-shrink: 0;
  }
  .lightbox-close:hover { background: var(--accent); color: #000; transform: rotate(90deg); }

  /* Nav arrows */
  .lightbox-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    z-index: 10;
    display: flex;
    gap: 8px;
    opacity: 0;
    transition: opacity 0.3s ease 0.3s;
  }
  .lightbox.expanded .lightbox-nav { opacity: 1; }
  .lightbox-nav.prev { left: 24px; }
  .lightbox-nav.next { right: 24px; }

  .nav-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(8px);
    transition: background 0.2s, transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    font-size: 1.1rem;
  }
  .nav-btn:hover {
    background: var(--accent);
    color: #000;
    transform: scale(1.1);
  }

  /* Counter */
  .lightbox-counter {
    position: absolute;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    opacity: 0;
    transition: opacity 0.3s ease 0.35s;
    z-index: 10;
  }
  .lightbox.expanded .lightbox-counter { opacity: 1; }

  /* Ripple indicator on cards */
  .card::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: var(--radius);
    background: radial-gradient(circle at var(--mx,50%) var(--my,50%), rgba(200,169,110,0.2) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .card:hover::after { opacity: 1; }

  /* Skeleton loading pulse */
  .card.loading {
    background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: skeleton 1.5s ease infinite;
  }
  @keyframes skeleton {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* Stagger reveal on load */
  .card {
    animation: cardReveal 0.6s cubic-bezier(0.34, 1.2, 0.64, 1) both;
  }
  @keyframes cardReveal {
    from { opacity: 0; transform: translateY(30px) scale(0.95); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Foto<span>.</span>Gallery</div>
  <div class="header-sub">Material Motion Demo</div>
</header>

<div class="gallery-label"><span>Colección</span></div>

<div class="gallery" id="gallery"></div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <div class="lightbox-backdrop" id="backdrop"></div>
  <div class="lightbox-nav prev">
    <button class="nav-btn" id="prevBtn">&#8592;</button>
  </div>
  <div class="lightbox-nav next">
    <button class="nav-btn" id="nextBtn">&#8594;</button>
  </div>
  <div class="lightbox-counter" id="counter"></div>
  <div class="lightbox-container" id="lightboxContainer">
    <div class="lightbox-img-wrap">
      <img id="lightboxImg" src="" alt="">
    </div>
    <div class="lightbox-info">
      <div>
        <h2 id="lightboxTitle"></h2>
        <p id="lightboxSub"></p>
      </div>
      <button class="lightbox-close" id="closeBtn">✕</button>
    </div>
  </div>
</div>

<script>
const photos = [
  { src: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1200&q=80', title: 'Picos Nevados', sub: 'Paisaje · Naturaleza' },
  { src: 'https://images.unsplash.com/photo-1501854140801-50d01698950b?w=1200&q=80', title: 'Valle Verde', sub: 'Naturaleza · Aéreo' },
  { src: 'https://images.unsplash.com/photo-1470770841072-f978cf4d019e?w=1200&q=80', title: 'Lago Espejo', sub: 'Agua · Reflexión' },
  { src: 'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=1200&q=80', title: 'Bosque Místico', sub: 'Bosque · Luz' },
  { src: 'https://images.unsplash.com/photo-1518020382113-a7e8fc38eac9?w=1200&q=80', title: 'Desierto Rojo', sub: 'Desierto · Texturas' },
  { src: 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1200&q=80', title: 'Cumbre Libre', sub: 'Montaña · Épico' },
  { src: 'https://images.unsplash.com/photo-1505765050516-f72dcac9c60e?w=1200&q=80', title: 'Cascada Viva', sub: 'Agua · Movimiento' },
  { src: 'https://images.unsplash.com/photo-1493246507139-91e8fad9978e?w=1200&q=80', title: 'Brumas Matutinas', sub: 'Niebla · Silencio' },
];

const gallery = document.getElementById('gallery');
const lightbox = document.getElementById('lightbox');
const backdrop = document.getElementById('backdrop');
const lbContainer = document.getElementById('lightboxContainer');
const lbImg = document.getElementById('lightboxImg');
const lbTitle = document.getElementById('lightboxTitle');
const lbSub = document.getElementById('lightboxSub');
const closeBtn = document.getElementById('closeBtn');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const counter = document.getElementById('counter');

let currentIndex = -1;
let isAnimating = false;

// Build cards
photos.forEach((p, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.style.animationDelay = `${i * 0.07}s`;
  card.innerHTML = `
    <img src="${p.src}" alt="${p.title}" loading="lazy">
    <div class="card-overlay">
      <div class="card-meta">
        <h3>${p.title}</h3>
        <p>${p.sub}</p>
      </div>
    </div>
  `;

  // Ripple effect
  card.addEventListener('mousemove', e => {
    const r = card.getBoundingClientRect();
    card.style.setProperty('--mx', ((e.clientX - r.left) / r.width * 100) + '%');
    card.style.setProperty('--my', ((e.clientY - r.top) / r.height * 100) + '%');
  });

  card.addEventListener('click', () => openLightbox(i, card));
  gallery.appendChild(card);
});

function getCard(i) {
  return gallery.querySelectorAll('.card')[i];
}

function openLightbox(index, cardEl) {
  if (isAnimating) return;
  isAnimating = true;
  currentIndex = index;

  const photo = photos[index];
  const cardRect = cardEl.getBoundingClientRect();

  // Set up lightbox image
  lbImg.src = photo.src;
  lbTitle.textContent = photo.title;
  lbSub.textContent = photo.sub;

  // Target: centered, larger
  const targetW = Math.min(window.innerWidth * 0.88, 900);
  const targetH = Math.min(window.innerHeight * 0.85, 640);
  const targetL = (window.innerWidth - targetW) / 2;
  const targetT = (window.innerHeight - targetH) / 2;

  // Start from card position
  lbContainer.style.cssText = `
    left: ${cardRect.left}px;
    top: ${cardRect.top}px;
    width: ${cardRect.width}px;
    height: ${cardRect.height}px;
    border-radius: ${getComputedStyle(cardEl).borderRadius};
    transition: none;
  `;

  lightbox.style.opacity = '1';
  lightbox.classList.add('active');
  updateCounter();

  // Force reflow
  lbContainer.getBoundingClientRect();

  // Animate to expanded state
  lbContainer.style.cssText = `
    left: ${targetL}px;
    top: ${targetT}px;
    width: ${targetW}px;
    height: ${targetH}px;
    border-radius: 20px;
    transition:
      left 0.5s cubic-bezier(0.4, 0, 0.2, 1),
      top 0.5s cubic-bezier(0.4, 0, 0.2, 1),
      width 0.5s cubic-bezier(0.4, 0, 0.2, 1),
      height 0.5s cubic-bezier(0.4, 0, 0.2, 1),
      border-radius 0.5s ease;
  `;

  setTimeout(() => {
    lightbox.classList.add('expanded');
    isAnimating = false;
  }, 300);
}

function closeLightbox() {
  if (isAnimating) return;
  isAnimating = true;

  const cardEl = getCard(currentIndex);
  const cardRect = cardEl.getBoundingClientRect();

  lightbox.classList.remove('expanded');

  setTimeout(() => {
    lbContainer.style.cssText = `
      left: ${cardRect.left}px;
      top: ${cardRect.top}px;
      width: ${cardRect.width}px;
      height: ${cardRect.height}px;
      border-radius: ${getComputedStyle(cardEl).borderRadius};
      transition:
        left 0.42s cubic-bezier(0.4, 0, 0.2, 1),
        top 0.42s cubic-bezier(0.4, 0, 0.2, 1),
        width 0.42s cubic-bezier(0.4, 0, 0.2, 1),
        height 0.42s cubic-bezier(0.4, 0, 0.2, 1),
        border-radius 0.42s ease;
    `;
  }, 50);

  setTimeout(() => {
    lightbox.style.opacity = '0';
    lightbox.classList.remove('active');
    lbContainer.style.cssText = '';
    isAnimating = false;
  }, 480);
}

function navigate(dir) {
  if (isAnimating) return;
  const newIndex = (currentIndex + dir + photos.length) % photos.length;
  const photo = photos[newIndex];
  currentIndex = newIndex;

  // Fade swap image
  lbImg.style.transition = 'opacity 0.2s ease';
  lbImg.style.opacity = '0';
  setTimeout(() => {
    lbImg.src = photo.src;
    lbTitle.textContent = photo.title;
    lbSub.textContent = photo.sub;
    lbImg.style.opacity = '1';
    updateCounter();
  }, 200);
}

function updateCounter() {
  counter.textContent = `${currentIndex + 1} / ${photos.length}`;
}

closeBtn.addEventListener('click', closeLightbox);
backdrop.addEventListener('click', closeLightbox);
prevBtn.addEventListener('click', () => navigate(-1));
nextBtn.addEventListener('click', () => navigate(1));

document.addEventListener('keydown', e => {
  if (!lightbox.classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navigate(-1);
  if (e.key === 'ArrowRight') navigate(1);
});
</script>
</body>
</html>
